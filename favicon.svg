<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Errand Boy">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a4c"/>
      <stop offset="0.55" stop-color="#ff5a1f"/>
      <stop offset="1" stop-color="#ff3d00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe29a"/>
      <stop offset="1" stop-color="#d9a23b"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- squircle tile -->
  <rect x="2" y="2" width="60" height="60" rx="17" fill="url(#ember)"/>
  <rect x="2" y="2" width="60" height="30" rx="17" fill="url(#sheen)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="16.3" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.2"/>
  <!-- EB monogram (mirrored E + B) -->
  <text x="32" y="43.5" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="800" font-size="30" letter-spacing="-1.5" fill="#1c0b03">
    <tspan transform="scale(-1,1) translate(-31.5,0)">E</tspan>B
  </text>
  <!-- gold prestige pip -->
  <circle cx="50" cy="14" r="3.4" fill="url(#gold)"/>
  <circle cx="50" cy="14" r="3.4" fill="none" stroke="#1c0b03" stroke-opacity="0.15" stroke-width="0.6"/>
</svg>
